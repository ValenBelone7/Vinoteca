{% extends 'vinoteca/base.html' %}
{% block title %}Nuevo varietal — {{ nombre_vinoteca }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-red-800 mb-6">Nuevo varietal</h1>
<form method="post" class="bg-white rounded-lg shadow p-6 space-y-4 max-w-lg">
    {% csrf_token %}
    <div>
        <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input type="text" id="nombre" name="nombre" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">
    </div>
    <div>
        <label for="descripcion" class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea id="descripcion" name="descripcion" rows="4"
                  class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"></textarea>
    </div>
    <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-red-800 text-white px-4 py-2 rounded hover:bg-red-900">Guardar</button>
        <a href="{% url 'home' %}" class="text-gray-600 px-4 py-2 hover:underline">Cancelar</a>
    </div>
</form>
{% endblock %}
