<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ nombre_vinoteca }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <nav class="bg-red-800 text-white px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold tracking-wide">🍷 {{ nombre_vinoteca }}</a>
        <div class="flex gap-4 items-center text-sm">
            <a href="{% url 'home' %}" class="hover:underline">Inicio</a>
            <a href="{% url 'lista_vinos' %}" class="hover:underline">Vinos</a>
            <a href="{% url 'lista_bodegas' %}" class="hover:underline">Bodegas</a>
            {% if user.is_authenticated %}
                <span class="text-red-200">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="hover:underline">Salir</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="hover:underline">Ingresar</a>
                <a href="{% url 'register' %}" class="hover:underline">Registrarse</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-red-900 text-red-200 text-center py-4 text-sm">
        {{ nombre_vinoteca }} &copy; 2026
    </footer>

</body>
</html>
