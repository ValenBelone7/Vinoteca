{% extends 'vinoteca/base.html' %}
{% block title %}Ingresar — {{ nombre_vinoteca }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold text-red-800 mb-6">Ingresar</h1>
    {% if form.errors %}
    <p class="text-red-600 text-sm mb-4">Usuario o contraseña incorrectos.</p>
    {% endif %}
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input type="text" name="username" id="id_username" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        <div>
            <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        <button type="submit" class="w-full bg-red-800 text-white py-2 rounded hover:bg-red-900">
            Ingresar
        </button>
    </form>
    <p class="text-sm text-gray-600 mt-4 text-center">
        ¿No tenés cuenta? <a href="{% url 'register' %}" class="text-red-800 hover:underline">Registrate</a>
    </p>
</div>
{% endblock %}
